{% extends 'base.html' %}
{% block content %}
  <h2>Saved Posts</h2>
  <div class="grid">
    {% for post in posts %}
      <div class="item">
        {% if post.filename.split('.')[-1] in ['mp4','mov','avi'] %}
          <video controls src="{{ url_for('uploads', filename=post.filename) }}" width="200"></video>
        {% else %}
          <img src="{{ url_for('uploads', filename=post.filename) }}" width="200">
        {% endif %}
        <p>{{ post.likes }} ❤️</p>
      </div>
    {% endfor %}
  </div>
{% endblock %}
