{% extends 'base.html' %}
{% block content %}
  <h2>Welcome, {{ username }}</h2>
  <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">Upload</button>
  </form>
  <h3>Your Posts</h3>
  <div class="grid">
    {% for post in posts %}
      <div class="item">
        {% if post.filename.split('.')[-1] in ['mp4','mov','avi'] %}
          <video controls src="{{ url_for('uploads', filename=post.filename) }}" width="200"></video>
        {% else %}
          <img src="{{ url_for('uploads', filename=post.filename) }}" width="200">
        {% endif %}
        <p>{{ post.likes }} ❤️</p>
      </div>
    {% endfor %}
  </div>
{% endblock %}
