{% extends 'base.html' %}
{% block content %}
  <h2>Public Posts</h2>
  <div class="grid">
    {% for post in posts %}
      <div class="item">
        {% if post.filename.split('.')[-1] in ['mp4','mov','avi'] %}
          <video controls src="{{ url_for('uploads', filename=post.filename) }}" width="200"></video>
        {% else %}
          <img src="{{ url_for('uploads', filename=post.filename) }}" width="200">
        {% endif %}
        <form action="{{ url_for('like', post_id=post.id) }}" method="post" style="display:inline">
          <button type="submit">❤️ {{ post.likes }}</button>
        </form>
        <form action="{{ url_for('save', post_id=post.id) }}" method="post" style="display:inline">
          <button type="submit">Save</button>
        </form>
      </div>
    {% endfor %}
  </div>
{% endblock %}
